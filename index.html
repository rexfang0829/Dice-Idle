<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🎲 第一桶金</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f1117;
  --surf:    #1a1d2a;
  --surf2:   #242838;
  --accent:  #f5a623;
  --red:     #e74c3c;
  --text:    #e8e8f0;
  --muted:   #7a7d99;
  --green:   #2ecc71;
  --r:       12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── Status Bar ── */
#status-bar {
  background: var(--surf);
  padding: 10px 14px 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
  border-bottom: 1px solid var(--surf2);
  flex-shrink: 0;
}
.stat { display: flex; align-items: baseline; gap: 5px; font-size: 12px; }
.stat-label { color: var(--muted); }
.stat-value { font-weight: 700; font-size: 14px; color: var(--accent); }
.stat-value.cps  { color: var(--green); }
.stat-value.goal { color: #9b59b6; }

#progress-wrap {
  grid-column: 1 / -1;
  background: var(--surf2);
  border-radius: 6px;
  height: 6px;
  overflow: hidden;
  margin-top: 2px;
}
#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #9b59b6, var(--accent));
  width: 0%;
  transition: width 0.5s;
  border-radius: 6px;
}

/* ── Dice Area ── */
#dice-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #1e2235 0%, var(--bg) 100%);
}
#dice-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Screen shake on crit */
@keyframes areaShake {
  0%,100% { transform: translate(0,0); }
  20%     { transform: translate(-4px, 2px); }
  40%     { transform: translate(4px,-3px); }
  60%     { transform: translate(-3px,-2px); }
  80%     { transform: translate(3px, 3px); }
}
#dice-area.shake { animation: areaShake 0.28s ease; }

/* ── Dice ── */
@keyframes diceSpawn {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);  opacity: 1; }
}
@keyframes goldPulse {
  0%,100% { box-shadow: 0 0 10px rgba(246,211,101,.6), 0 4px 16px rgba(0,0,0,.5); }
  50%     { box-shadow: 0 0 22px rgba(246,211,101,1.0), 0 4px 16px rgba(0,0,0,.5); }
}
@keyframes megaPulse {
  0%  { box-shadow: 0 0 16px rgba(139,92,246,.8), 0 4px 16px rgba(0,0,0,.5); }
  33% { box-shadow: 0 0 22px rgba(59,130,246,.9), 0 4px 16px rgba(0,0,0,.5); }
  66% { box-shadow: 0 0 22px rgba(236,72,153,.9), 0 4px 16px rgba(0,0,0,.5); }
  100%{ box-shadow: 0 0 16px rgba(139,92,246,.8), 0 4px 16px rgba(0,0,0,.5); }
}
@keyframes autoPulse {
  0%  { transform: scale(1); }
  50% { transform: scale(0.82); }
  100%{ transform: scale(1); }
}

.dice {
  position: absolute;
  width: 64px;
  height: 64px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.8);
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.08s ease;
  animation: diceSpawn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  will-change: transform;
}
.dice:active { transform: scale(0.88); }

.dice.gold {
  background: linear-gradient(135deg, #fef3a0, #fad85a);
  border: 2px solid #d4a017;
  animation: diceSpawn 0.25s cubic-bezier(0.34,1.56,0.64,1),
             goldPulse 2s 0.25s ease-in-out infinite;
}
.dice.mega {
  background: linear-gradient(135deg, #1a0a3e, #2d1065);
  border: 2px solid #8b5cf6;
  animation: diceSpawn 0.25s cubic-bezier(0.34,1.56,0.64,1),
             megaPulse 1.5s 0.25s ease-in-out infinite;
}
.dice.auto-clicked { animation: autoPulse 0.15s ease !important; }

/* Pips */
.dice-pips { position: relative; width: 100%; height: 100%; }
.pip {
  position: absolute;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  box-shadow: inset 0 1px 2px rgba(0,0,0,.25);
}

/* Crit flash */
#crit-flash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  z-index: 400;
  background: rgba(231,76,60,.3);
}
@keyframes flashOut { 0% { opacity: 1; } 100% { opacity: 0; } }
#crit-flash.flash { animation: flashOut 0.4s ease-out forwards; }

/* Float text */
@keyframes floatUp {
  0%   { transform: translateY(0) scale(1);    opacity: 1; }
  60%  { transform: translateY(-52px) scale(1.1); opacity: 1; }
  100% { transform: translateY(-80px) scale(.9); opacity: 0; }
}
@keyframes floatUpBig {
  0%   { transform: translateY(0) scale(1.2); opacity: 1; }
  30%  { transform: translateY(-20px) scale(1.4); opacity: 1; }
  100% { transform: translateY(-90px) scale(.8); opacity: 0; }
}

.float-text {
  position: absolute;
  pointer-events: none;
  font-weight: 800;
  white-space: nowrap;
  z-index: 100;
  font-size: 18px;
  color: var(--accent);
  text-shadow: 0 2px 6px rgba(0,0,0,.6);
  animation: floatUp 0.9s ease-out forwards;
}
.float-text.crit {
  font-size: 26px;
  color: var(--red);
  text-shadow: 0 0 14px rgba(231,76,60,.9), 0 2px 8px rgba(0,0,0,.7);
  animation: floatUpBig 1.1s ease-out forwards;
}
.float-text.gold-text {
  font-size: 20px;
  color: #f6d365;
  text-shadow: 0 0 10px rgba(246,211,101,.8), 0 2px 6px rgba(0,0,0,.6);
}
.float-text.mega-text {
  font-size: 22px;
  color: #c084fc;
  text-shadow: 0 0 12px rgba(139,92,246,.9), 0 2px 6px rgba(0,0,0,.6);
  animation: floatUpBig 1.1s ease-out forwards;
}
.float-text.mega-crit {
  font-size: 30px;
  font-style: italic;
  color: #ff6b35;
  text-shadow: 0 0 20px rgba(255,107,53,.9), 0 2px 8px rgba(0,0,0,.7);
  animation: floatUpBig 1.3s ease-out forwards;
}

/* ── Upgrade Area ── */
#upgrade-area {
  background: var(--surf);
  border-top: 1px solid var(--surf2);
  flex-shrink: 0;
  max-height: 42vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#upgrade-area::-webkit-scrollbar { width: 4px; }
#upgrade-area::-webkit-scrollbar-thumb { background: var(--surf2); border-radius: 4px; }

.upgrade-title {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 2px 4px;
  font-weight: 700;
}

.upgrade-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surf2);
  border: 1.5px solid transparent;
  border-radius: var(--r);
  padding: 10px 12px;
  cursor: pointer;
  color: var(--text);
  text-align: left;
  min-height: 56px;
  transition: border-color .15s, background .15s, transform .08s;
  -webkit-tap-highlight-color: transparent;
  width: 100%;
}
.upgrade-btn:not(:disabled) {
  border-color: var(--accent);
  background: linear-gradient(135deg, var(--surf2) 0%, #2a2e45 100%);
}
.upgrade-btn:not(:disabled):hover { background: linear-gradient(135deg,#2a2e45,#323759); }
.upgrade-btn:not(:disabled):active { transform: scale(0.97); }
.upgrade-btn:disabled { opacity: .45; cursor: not-allowed; }

/* Pulse when newly affordable */
@keyframes upgradePulse {
  0%  { transform: scale(1); }
  40% { transform: scale(1.03); box-shadow: 0 0 18px rgba(245,166,35,.7); }
  100%{ transform: scale(1); box-shadow: none; }
}
.upgrade-btn.pulse { animation: upgradePulse 0.5s ease; }

.upgrade-icon { font-size: 26px; flex-shrink: 0; width: 36px; text-align: center; }
.upgrade-info { flex: 1; }
.upgrade-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
.upgrade-level {
  background: var(--accent);
  color: #000;
  font-size: 10px;
  font-weight: 800;
  padding: 1px 5px;
  border-radius: 4px;
}
.upgrade-effect { font-size: 11px; color: var(--muted); margin-top: 2px; }
.upgrade-cost   { font-weight: 700; font-size: 13px; color: var(--accent); flex-shrink: 0; text-align: right; }

/* ── Bottom bar ── */
#bottom-bar {
  background: var(--surf);
  border-top: 1px solid var(--surf2);
  padding: 8px 12px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.ctrl-btn {
  flex: 1;
  background: var(--surf2);
  border: 1px solid #3a3f5c;
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 6px;
  min-height: 44px;
  cursor: pointer;
  transition: background .15s, transform .08s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { transform: scale(0.95); background: #3a3f5c; }
.ctrl-btn.danger { border-color: var(--red); color: var(--red); }
.ctrl-btn.pause-active { background: #3a3f5c; }

/* ── Win banner ── */
#win-banner {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.75);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 24px;
  text-align: center;
}
#win-banner.show { display: flex; }
#win-banner h2 { font-size: 28px; color: var(--accent); }
#win-banner p  { font-size: 15px; line-height: 1.6; }
.next-stage {
  background: var(--surf2);
  border: 1.5px solid #9b59b6;
  border-radius: var(--r);
  padding: 14px 20px;
  width: 100%;
  max-width: 280px;
}
.next-stage h3    { color: #9b59b6; font-size: 15px; }
.next-stage small { color: var(--muted); font-size: 12px; }
#win-close {
  background: var(--accent);
  color: #000;
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: 8px;
  padding: 12px 28px;
  cursor: pointer;
}

/* ── Combo Bar ── */
#combo-bar {
  background: var(--surf);
  border-top: 1px solid var(--surf2);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  min-height: 48px;
}
.combo-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  flex-shrink: 0;
}
#combo-dice-row { display: flex; gap: 5px; align-items: center; }
.combo-slot {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  border: 1.5px dashed rgba(255,255,255,.15);
  background: rgba(255,255,255,.04);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 800;
  color: #1a1a1a;
  transition: transform .15s, box-shadow .15s;
}
.combo-slot.filled       { background: #fff; border-style: solid; border-color: rgba(255,255,255,.5); }
.combo-slot.filled.red   { color: #e03030; }
.combo-slot.filled.new   { animation: slotPop .25s cubic-bezier(.34,1.56,.64,1); }
@keyframes slotPop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

#combo-result {
  flex: 1;
  text-align: right;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  transition: color .2s;
}
#combo-result.triple   { color: #f5a623; }
#combo-result.straight { color: #3b82f6; }
#combo-result.full     { color: #a855f7; }

/* Combo announcement (center of dice area) */
#combo-announce {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%,-50%) scale(0);
  font-size: 32px;
  font-weight: 900;
  pointer-events: none;
  z-index: 150;
  text-align: center;
  white-space: nowrap;
  opacity: 0;
  text-shadow: 0 0 20px currentColor, 0 3px 10px rgba(0,0,0,.7);
  line-height: 1.3;
}
@keyframes comboAnnounce {
  0%   { opacity:0; transform: translate(-50%,-50%) scale(.3); }
  25%  { opacity:1; transform: translate(-50%,-50%) scale(1.2); }
  60%  { opacity:1; transform: translate(-50%,-60%) scale(1); }
  100% { opacity:0; transform: translate(-50%,-70%) scale(.9); }
}
#combo-announce.show { animation: comboAnnounce 1.6s ease-out forwards; }
#combo-announce.triple-color   { color: #f5a623; }
#combo-announce.straight-color { color: #60a5fa; }
#combo-announce.full-color     { color: #c084fc; }

/* ── Offline popup ── */
#offline-popup {
  display: none;
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--surf);
  border-top: 2px solid var(--green);
  padding: 12px 16px;
  z-index: 150;
  flex-direction: column;
  gap: 6px;
  animation: slideUp .3s ease;
}
#offline-popup.show { display: flex; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
#offline-popup p { font-size: 13px; }
#offline-popup strong { color: var(--green); }
#offline-popup button {
  align-self: flex-end;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 6px 16px;
  font-weight: 700;
  cursor: pointer;
}
/* ── Win banner extras ── */
#win-time { font-size: 28px; font-weight: 900; color: var(--green); margin: 4px 0; }
#win-name-row { display: flex; gap: 8px; width: 100%; max-width: 280px; }
#win-name-input {
  flex: 1;
  background: var(--surf2);
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  padding: 8px 12px;
  outline: none;
}
#win-name-input::placeholder { color: var(--muted); }
#win-record-btn {
  background: var(--accent);
  color: #000;
  font-size: 14px;
  font-weight: 700;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  white-space: nowrap;
}
#win-saved-msg { font-size: 12px; color: var(--green); min-height: 18px; }

/* ── Leaderboard modal ── */
#lb-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#lb-modal.show { display: flex; }
#lb-box {
  background: var(--surf);
  border-radius: 16px;
  border: 1px solid var(--surf2);
  width: 100%;
  max-width: 360px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
#lb-box h2 { font-size: 20px; color: var(--accent); text-align: center; }
#lb-list { display: flex; flex-direction: column; gap: 6px; }
.lb-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surf2);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 14px;
}
.lb-rank  { font-weight: 800; color: var(--muted); width: 24px; text-align: center; flex-shrink: 0; }
.lb-rank.gold   { color: #f6d365; }
.lb-rank.silver { color: #c0c0c0; }
.lb-rank.bronze { color: #cd7f32; }
.lb-name  { flex: 1; font-weight: 600; }
.lb-time  { font-weight: 700; color: var(--green); font-family: monospace; }
.lb-date  { font-size: 11px; color: var(--muted); }
.lb-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 12px; }
#lb-actions { display: flex; gap: 8px; }
#lb-restart-btn {
  flex: 1;
  background: var(--surf2);
  border: 1px solid var(--accent2);
  color: var(--accent2);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  padding: 10px;
  cursor: pointer;
  min-height: 44px;
}
#lb-close-btn {
  flex: 1;
  background: var(--accent);
  border: none;
  color: #000;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  padding: 10px;
  cursor: pointer;
  min-height: 44px;
}

/* ── Splash Screen ── */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  gap: 12px; padding: 24px 20px 40px;
  text-align: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#splash h1 {
  font-size: 38px; font-weight: 900;
  color: var(--accent);
  letter-spacing: 4px;
  text-shadow: 0 0 24px rgba(245,166,35,0.6);
  margin-top: 8px;
}
#splash .splash-dice-row {
  display: flex; gap: 12px; margin: 8px 0;
}
#splash .splash-dice {
  width: 44px; height: 44px;
  background: var(--surf); border-radius: 8px;
  border: 2px solid var(--accent);
  animation: splashBounce 1.2s ease-in-out infinite;
}
#splash .splash-dice:nth-child(2) { animation-delay: 0.2s; }
#splash .splash-dice:nth-child(3) { animation-delay: 0.4s; }
@keyframes splashBounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
#splash .rules-box {
  background: var(--surf);
  border-radius: var(--r);
  border: 1px solid var(--surf2);
  padding: 14px 18px;
  max-width: 340px;
  width: 100%;
  text-align: left;
  line-height: 1.7;
  font-size: 13px;
  color: var(--text);
}
#splash .rules-box h3 {
  color: var(--accent); font-size: 15px; margin-bottom: 8px; text-align: center;
}
.rules-box .tag {
  display: inline-block;
  background: var(--surf2); border-radius: 6px;
  padding: 1px 7px; font-size: 12px; color: var(--muted);
  margin-right: 2px;
}
.rule-item { display: flex; align-items: flex-start; gap: 8px; margin: 4px 0; }
.rule-item .ico { min-width: 22px; text-align: center; }
#splash-start {
  margin-top: 8px;
  background: var(--accent); color: #000;
  border: none; border-radius: 12px;
  font-size: 20px; font-weight: 900;
  padding: 14px 56px;
  cursor: pointer;
  box-shadow: 0 0 24px rgba(245,166,35,0.5);
  animation: splashPulse 1.6s ease-in-out infinite;
}
@keyframes splashPulse {
  0%,100% { box-shadow: 0 0 16px rgba(245,166,35,0.4); transform: scale(1); }
  50% { box-shadow: 0 0 36px rgba(245,166,35,0.8); transform: scale(1.04); }
}
@keyframes splashFade {
  to { opacity: 0; pointer-events: none; }
}
#splash.hide {
  animation: splashFade 0.5s ease forwards;
}
</style>
</head>
<body>

<!-- Splash / Cover Screen -->
<div id="splash">
  <h1>第一桶金</h1>
  <div class="splash-dice-row">
    <div class="splash-dice"></div>
    <div class="splash-dice"></div>
    <div class="splash-dice"></div>
  </div>
  <div class="rules-box">
    <h3>📖 遊戲規則</h3>
    <div class="rule-item"><span class="ico">🎲</span><span>點擊骰子或讓它自動滾動，累積金幣</span></div>
    <div class="rule-item"><span class="ico">💰</span><span><b>持有 1,000,000 金幣</b>即達成目標！</span></div>
    <div class="rule-item"><span class="ico">⏱</span><span>計時從按下開始鍵算起，挑戰最短時間</span></div>
    <div class="rule-item"><span class="ico">🃏</span><span>連續手動點出 <span class="tag">豹子</span><span class="tag">順子</span><span class="tag">葫蘆</span> 觸發連擊獎勵</span></div>
    <div class="rule-item"><span class="ico">✨</span><span>金骰 ×3、彩骰 ×8，運氣升級提升出現率</span></div>
    <div class="rule-item"><span class="ico">🏆</span><span>破關後記錄名字，上本機排行榜！</span></div>
  </div>

</div>

    <div id="combo-announce"></div>

  <!-- 連擊槽 -->
  <div id="combo-bar">
    <span class="combo-label">連擊</span>

      <button id="lb-restart-btn" onclick="restartGame()">🔄 重新開始</button>
      <button id="lb-close-btn"   onclick="closeLeaderboard()">關閉</button>
    </div>
  </div>
</div>

<script type="module">
/* ═══════════════════════════════════════
   DICE IDLE  v2
   ═══════════════════════════════════════ */

const SAVE_VERSION = 4;
const BASE_COIN    = 5;

const UPGRADE_DEFS = [
  {
    key: 'coinMultiplierLevel',
    name: '金幣倍率', icon: '💎', baseCost: 80,
    effect: (l) => 'x' + (1 + l * 0.2).toFixed(1) + ' 倍收益'
  },
  {
    key: 'spawnSpeedLevel',
    name: '骰子速度', icon: '⚡', baseCost: 200,
    effect: (l) => '每 ' + (Math.max(300, 2000 * Math.pow(0.92, l)) / 1000).toFixed(2) + 's 生成'
  },
  {
    key: 'maxDiceLevel',
    name: '骰子上限', icon: '🎲', baseCost: 400,
    effect: (l) => '最多 ' + (10 + l * 3) + ' 顆骰子'
  },
  {
    key: 'critChanceLevel',
    name: '暴擊率',  icon: '💥', baseCost: 800,
    effect: (l) => Math.min(50, l) + '% 暴擊 (x10)'
  },
  {
    key: 'autoClickLevel',
    name: '自動手指', icon: '🤖', baseCost: 5000,
    effect: (l) => l === 0
      ? '尚未解鎖'
      : '每 ' + (Math.max(500, 5000 * Math.pow(0.85, l - 1)) / 1000).toFixed(2) + 's 自動點'
  },
  {
    key: 'rareLuckLevel',
    name: '骰子運氣', icon: '🍀', baseCost: 600,
    effect: (l) => {
      const g = Math.min(45, 18 + l * 3);
      const m = Math.min(20,  7 + l * 1);
      return '金骰 ' + g + '% / 超級骰 ' + m + '%';
    }
  }
];

function createInitialState() {
  return {
    coins: 60,
    totalCoinsEarned: 0,
    diceList: [],
    nextDiceId: 1,
    coinMultiplierLevel: 0,
    spawnSpeedLevel:     0,
    maxDiceLevel:        0,
    critChanceLevel:     0,
    autoClickLevel:      0,
    rareLuckLevel:       0,
    lastSpawnTime:     Date.now(),
    lastAutoClickTime: Date.now(),
    lastSaveTime:      Date.now(),
    isPaused: false,
    winShown: false,
    playSeconds: 0,
    lastTickTime: Date.now(),
    comboBuffer: []        // 最近 5 次手動點擊的點數
  };
}
let gs = createInitialState();

const coinMult   = () => 1 + gs.coinMultiplierLevel * 0.2;
const spawnMs    = () => Math.max(300, 2000 * Math.pow(0.92, gs.spawnSpeedLevel));
const maxDice    = () => 10 + gs.maxDiceLevel * 3;
const critChance = () => Math.min(0.5, gs.critChanceLevel * 0.01);
const autoMs     = () => Math.max(500, 5000 * Math.pow(0.85, gs.autoClickLevel - 1));

function estimatedCps() {
  const critMult  = 1 + critChance() * 9;
  const avgReward = 3.5 * BASE_COIN * coinMult() * critMult;
  let cps = (1000 / spawnMs()) * avgReward;
  if (gs.autoClickLevel > 0) cps += (1000 / autoMs()) * avgReward;
  return cps;
}

function upgradeCost(key, lvl) {
  const d = UPGRADE_DEFS.find(d => d.key === key);
  return Math.floor(d.baseCost * Math.pow(1.35, lvl));
}

function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return ''+n;
}

function getDiceType() {
  const megaChance = Math.min(0.20, 0.07 + gs.rareLuckLevel * 0.01);
  const goldChance = Math.min(0.45, 0.18 + gs.rareLuckLevel * 0.03);
  const r = Math.random();
  if (r < megaChance)                return 'mega';
  if (r < megaChance + goldChance)   return 'gold';
  return 'normal';
}

function buildPips(value, type) {
  const POS = [13, 32, 51], OFF = 6;
  const layouts = {
    1: [[1,1]],
    2: [[0,2],[2,0]],
    3: [[0,2],[1,1],[2,0]],
    4: [[0,0],[0,2],[2,0],[2,2]],
    5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
    6: [[0,0],[1,0],[2,0],[0,2],[1,2],[2,2]]
  };
  const red = value === 1 || value === 4;
  const col = type === 'mega' ? '#d8b4fe'
            : type === 'gold' ? (red ? '#8b2500' : '#4a2900')
            : (red ? '#e03030' : '#1a1a1a');
  let h = '<div class="dice-pips">';
  layouts[value].forEach(([r,c]) => {
    h += '<div class="pip" style="top:'+(POS[r]-OFF)+'px;left:'+(POS[c]-OFF)+'px;background:'+col+'"></div>';
  });
  return h + '</div>';
}

function spawnDice() {
  if (gs.diceList.length >= maxDice()) return;
  const area = document.getElementById('dice-area');
  const S = 64, W = area.clientWidth - S, H = area.clientHeight - S;
  const type  = getDiceType();
  const value = type === 'mega' ? 6 : Math.ceil(Math.random() * 6);
  const dice  = { id: gs.nextDiceId++, value, type, x: Math.max(0, Math.random()*W), y: Math.max(0, Math.random()*H) };
  gs.diceList.push(dice);
  renderDie(dice);
}

function renderDie(dice) {
  const area = document.getElementById('dice-area');
  const el   = document.createElement('div');
  el.className = 'dice' + (dice.type !== 'normal' ? ' ' + dice.type : '');
  el.id        = 'dice-' + dice.id;
  el.innerHTML = buildPips(dice.value, dice.type);
  el.style.cssText = 'left:' + dice.x + 'px;top:' + dice.y + 'px';
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); clickDice(dice.id); });
  area.appendChild(el);
}

function clickDice(id, isAuto) {
  const idx = gs.diceList.findIndex(d => d.id === id);
  if (idx === -1) return;
  const dice = gs.diceList[idx];
  const { reward, isCrit } = calcReward(dice.value, dice.type);
  gs.coins            += reward;
  gs.totalCoinsEarned += reward;
  gs.diceList.splice(idx, 1);
  const el = document.getElementById('dice-' + id);
  if (el) { showFloat(dice.x + 32, dice.y + 32, reward, isCrit, dice.type); el.remove(); }
  if (isCrit) doCritFx();
  if (!isAuto) pushCombo(dice.value);
  if (!gs.winShown && gs.coins >= 1000000) {
    gs.winShown = true;
    document.getElementById('win-time').textContent = fmtTime(gs.playSeconds);
    document.getElementById('win-banner').classList.add('show');
  }
  updateHUD();
  renderUpgrades();
}

function calcReward(value, type) {
  const isCrit    = Math.random() < critChance();
  const typeBonus = type === 'mega' ? 8 : type === 'gold' ? 3 : 1;
  const base      = value * BASE_COIN * coinMult() * typeBonus;
  return { reward: Math.floor(isCrit ? base * 10 : base), isCrit };
}

function doCritFx() {
  const area  = document.getElementById('dice-area');
  const flash = document.getElementById('crit-flash');
  area.classList.remove('shake');   void area.offsetWidth;  area.classList.add('shake');
  flash.classList.remove('flash');  void flash.offsetWidth; flash.classList.add('flash');
}

// ── Combo system ──
// 自動點擊不計入連擊，保留手動玩家的策略優勢

function pushCombo(value) {
  gs.comboBuffer.push(value);
  if (gs.comboBuffer.length > 5) gs.comboBuffer.shift();

  const combo = detectCombo(gs.comboBuffer);
  renderComboBar(combo);

  if (combo && combo.complete) {
    const reward = Math.floor(combo.sum * BASE_COIN * coinMult() * combo.mult);
    gs.coins            += reward;
    gs.totalCoinsEarned += reward;
    gs.comboBuffer = [];

    showComboAnnounce(combo, reward);
    updateHUD();
    renderUpgrades();
    setTimeout(() => renderComboBar(null), 100);
  }
}

function detectCombo(buf) {
  const len = buf.length;
  if (len < 3) return null;

  // 優先檢查 5 張牌型
  if (len >= 5) {
    const last5  = buf.slice(-5);
    const sorted = [...last5].sort((a,b) => a-b);

    // 葫蘆：3同 + 2同
    const counts = {};
    last5.forEach(v => { counts[v] = (counts[v]||0) + 1; });
    const freq = Object.values(counts).sort((a,b) => b-a);
    if (freq[0] === 3 && freq[1] === 2) {
      return { complete:true, type:'葫蘆', icon:'🍯', cls:'full',
               sum: last5.reduce((a,b)=>a+b,0), mult: 30 };
    }

    // 順子：連續 5 個不同值
    const isStraight = sorted.every((v,i) => i===0 || v === sorted[i-1]+1);
    if (isStraight) {
      return { complete:true, type:'順子', icon:'🌊', cls:'straight',
               sum: last5.reduce((a,b)=>a+b,0), mult: 15 };
    }
  }

  // 豹子：最後 3 張相同
  const last3 = buf.slice(-3);
  if (last3.every(v => v === last3[0])) {
    return { complete:true, type:'豹子', icon:'🎯', cls:'triple',
             sum: last3.reduce((a,b)=>a+b,0), mult: 20 };
  }

  return null;
}

function renderComboBar(combo) {
  const buf = gs.comboBuffer;
  for (let i = 0; i < 5; i++) {
    const slot = document.getElementById('cs'+i);
    if (!slot) continue;
    const val = buf[i];
    if (val !== undefined) {
      const isRed = val === 1 || val === 4;
      slot.className   = 'combo-slot filled' + (isRed ? ' red' : '') + (i === buf.length-1 ? ' new' : '');
      slot.textContent = val;
    } else {
      slot.className   = 'combo-slot';
      slot.textContent = '';
    }
  }
  const result = document.getElementById('combo-result');
  if (!result) return;
  if (combo && combo.complete) {
    result.textContent = combo.icon + ' ' + combo.type + ' 觸發！';
    result.className   = 'combo-result ' + combo.cls;
  } else if (buf.length === 0) {
    result.textContent = '等待牌型…';
    result.className   = 'combo-result';
  } else {
    result.textContent = '繼續點點點…';
    result.className   = 'combo-result';
  }
}

function showComboAnnounce(combo, reward) {
  const el = document.getElementById('combo-announce');
  if (!el) return;
  el.innerHTML = combo.icon + ' ' + combo.type + '！<br><span style="font-size:22px;font-style:normal">+' + fmt(reward) + ' 金幣</span>';
  el.className = 'combo-announce ' + combo.cls + '-color';
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');

  // 顏色閃屏
  const flash = document.getElementById('crit-flash');
  const colors = { triple:'rgba(245,166,35,.35)', straight:'rgba(59,130,246,.35)', full:'rgba(168,85,247,.35)' };
  flash.style.background = colors[combo.cls] || 'rgba(245,166,35,.35)';
  flash.classList.remove('flash'); void flash.offsetWidth; flash.classList.add('flash');
  // 還原顏色給暴擊用
  setTimeout(() => { flash.style.background = ''; }, 500);
}

function showFloat(x, y, amount, isCrit, type) {
  const area = document.getElementById('dice-area');
  const el   = document.createElement('div');
  let text, cls;
  if      (isCrit && type === 'mega') { text = '🔥💥 MEGA CRIT +'+fmt(amount); cls = 'float-text mega-crit'; }
  else if (isCrit)                    { text = '💥 CRIT +'+fmt(amount);         cls = 'float-text crit'; }
  else if (type === 'mega')           { text = '🔥 +'+fmt(amount);              cls = 'float-text mega-text'; }
  else if (type === 'gold')           { text = '⭐ +'+fmt(amount);              cls = 'float-text gold-text'; }
  else                                { text = '+'+fmt(amount);                  cls = 'float-text'; }
  el.className   = cls;
  el.textContent = text;
  el.style.left  = (x-30)+'px';
  el.style.top   = (y-10)+'px';
  area.appendChild(el);
  setTimeout(() => el.remove(), (isCrit || type==='mega') ? 1200 : 900);
}

function buyUpgrade(key) {
  const lvl = gs[key], cost = upgradeCost(key, lvl);
  if (gs.coins < cost) return;
  gs.coins -= cost;
  gs[key]  += 1;
  saveGame(); renderUpgrades(); updateHUD();
}

function renderUpgrades() {
  const area = document.getElementById('upgrade-area');
  if (!area._built) {
    area.innerHTML = '<div class="upgrade-title">升級天賦</div>';
    UPGRADE_DEFS.forEach(def => {
      const btn = document.createElement('button');
      btn.className = 'upgrade-btn';
      btn.id = 'upg-' + def.key;
      btn.innerHTML = '<div class="upgrade-icon">'+def.icon+'</div>'
        + '<div class="upgrade-info">'
        +   '<div class="upgrade-name">'+def.name+' <span class="upgrade-level" id="ul-'+def.key+'">Lv.0</span></div>'
        +   '<div class="upgrade-effect" id="ue-'+def.key+'"></div>'
        + '</div>'
        + '<div class="upgrade-cost" id="uc-'+def.key+'"></div>';
      btn.addEventListener('click', () => buyUpgrade(def.key));
      area.appendChild(btn);
    });
    area._built = true;
  }
  UPGRADE_DEFS.forEach(def => {
    const lvl  = gs[def.key];
    const cost = upgradeCost(def.key, lvl);
    const can  = gs.coins >= cost;
    document.getElementById('ul-'+def.key).textContent = 'Lv.'+lvl;
    document.getElementById('ue-'+def.key).textContent = def.effect(lvl);
    document.getElementById('uc-'+def.key).textContent = '🪙 '+fmt(cost);
    const btn = document.getElementById('upg-'+def.key);
    const was = btn.disabled;
    btn.disabled = !can;
    if (was && can) {
      btn.classList.remove('pulse'); void btn.offsetWidth; btn.classList.add('pulse');
      setTimeout(() => btn.classList.remove('pulse'), 500);
    }
  });
}

function fmtTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  return h > 0
    ? h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0')
    : String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function updateHUD() {
  const pct = Math.min(100, gs.coins / 10000);   // 1,000,000 / 100 = 10000
  document.getElementById('stat-coins').textContent    = fmt(gs.coins);
  document.getElementById('stat-time').textContent     = fmtTime(gs.playSeconds);
  document.getElementById('stat-cps').textContent      = fmt(estimatedCps())+'/s';
  document.getElementById('stat-progress').textContent = pct.toFixed(2)+'%';
  document.getElementById('progress-bar').style.width  = pct+'%';
}

function gameLoop() {
  if (!gs.isPaused) {
    const now = Date.now();
    // 累積遊玩時間（只在非暫停時計）
    gs.playSeconds += (now - gs.lastTickTime) / 1000;
    gs.lastTickTime = now;
    if (now - gs.lastSpawnTime >= spawnMs()) { spawnDice(); gs.lastSpawnTime = now; }
    if (gs.autoClickLevel > 0 && now - gs.lastAutoClickTime >= autoMs()) {
      if (gs.diceList.length > 0) {
        const t = gs.diceList[Math.floor(Math.random() * gs.diceList.length)];
        const el = document.getElementById('dice-'+t.id);
        if (el) { el.classList.remove('auto-clicked'); void el.offsetWidth; el.classList.add('auto-clicked'); }
        clickDice(t.id, true);
      }
      gs.lastAutoClickTime = now;
    }
    if (now - gs.lastSaveTime >= 5000) saveGame();
  }
  requestAnimationFrame(gameLoop);
}

function saveGame() {
  try {
    localStorage.setItem('diceIdleSave', JSON.stringify({
      version: SAVE_VERSION,
      coins: gs.coins, totalCoinsEarned: gs.totalCoinsEarned,
      coinMultiplierLevel: gs.coinMultiplierLevel,
      spawnSpeedLevel: gs.spawnSpeedLevel, maxDiceLevel: gs.maxDiceLevel,
      critChanceLevel: gs.critChanceLevel, autoClickLevel: gs.autoClickLevel,
      nextDiceId: gs.nextDiceId, winShown: gs.winShown, rareLuckLevel: gs.rareLuckLevel,
      playSeconds: gs.playSeconds, lastSaveTime: Date.now()
    }));
  } catch(e) {}
  gs.lastSaveTime = Date.now();
}

function loadGame() {
  try {
    const raw = localStorage.getItem('diceIdleSave');
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.version !== SAVE_VERSION) { localStorage.removeItem('diceIdleSave'); return; }
    gs.coins               = d.coins               ?? 60;
    gs.totalCoinsEarned    = d.totalCoinsEarned    ?? 0;
    gs.coinMultiplierLevel = d.coinMultiplierLevel ?? 0;
    gs.spawnSpeedLevel     = d.spawnSpeedLevel     ?? 0;
    gs.maxDiceLevel        = d.maxDiceLevel        ?? 0;
    gs.critChanceLevel     = d.critChanceLevel     ?? 0;
    gs.autoClickLevel      = d.autoClickLevel      ?? 0;
    gs.nextDiceId          = d.nextDiceId          ?? 1;
    gs.winShown            = d.winShown            ?? false;
    gs.rareLuckLevel       = d.rareLuckLevel       ?? 0;
    gs.playSeconds         = d.playSeconds         ?? 0;
    gs.lastTickTime        = Date.now();
    if (d.lastSaveTime) {
      const sec    = Math.min((Date.now() - d.lastSaveTime) / 1000, 3600);
      const reward = Math.floor(estimatedCps() * sec * 0.1);
      if (sec >= 5 && reward > 0) {
        gs.coins += reward; gs.totalCoinsEarned += reward;
        showOfflinePopup(sec, reward);
      }
    }
  } catch(e) { localStorage.removeItem('diceIdleSave'); }
}


function resetGame() {
  if (!confirm('確定要重置？所有進度將清除！')) return;
  try { localStorage.removeItem('diceIdleSave'); } catch(e) {}
  document.querySelectorAll('.dice').forEach(e => e.remove());
  gs = createInitialState();
  document.getElementById('upgrade-area')._built = false;
  document.getElementById('win-banner').classList.remove('show');
  renderUpgrades(); updateHUD();
}

function togglePause() {
  gs.isPaused = !gs.isPaused;
  const b = document.getElementById('btn-pause');
  b.textContent = gs.isPaused ? '▶ 繼續' : '⏸ 暫停';
  b.classList.toggle('pause-active', gs.isPaused);
}

function showOfflinePopup(sec, reward) {
  const mins = sec >= 60 ? Math.floor(sec/60)+'分'+Math.floor(sec%60)+'秒' : Math.floor(sec)+'秒';
  document.getElementById('offline-msg').innerHTML =
    '⏰ 離線 <strong>'+mins+'</strong>，獲得 <strong>+'+fmt(reward)+'</strong> 金幣（效率 10%）';
  document.getElementById('offline-popup').classList.add('show');
}
function closeOfflinePopup() { document.getElementById('offline-popup').classList.remove('show'); }

document.getElementById('win-close').addEventListener('click', () => {
  document.getElementById('win-banner').classList.remove('show');
});

// ── Firebase 連線排行榜 ──
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, query, orderByChild, limitToFirst, get }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBZv5DdM9maFN1AidatCw4EjV8XAMiD6MI",
  authDomain:        "crazy-dice-9c572.firebaseapp.com",
  databaseURL:       "https://crazy-dice-9c572-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "crazy-dice-9c572",
  storageBucket:     "crazy-dice-9c572.firebasestorage.app",
  messagingSenderId: "233632327701",
  appId:             "1:233632327701:web:4fa9f125ed92abd006061c"
};

const fbApp = initializeApp(firebaseConfig);
const fbDb  = getDatabase(fbApp);

async function fbSubmit(name, seconds) {
  if (seconds < 60) return; // 60 秒內不上傳
  try {
    await push(ref(fbDb, 'records'), {
      name, time: seconds,
      date: new Date().toLocaleDateString('zh-TW')
    });
  } catch(e) { console.warn('Firebase write failed', e); }
}

async function fbLoadRecords() {
  try {
    const q = query(ref(fbDb, 'records'), orderByChild('time'), limitToFirst(10));
    const snap = await get(q);
    const rows = [];
    snap.forEach(child => rows.push(child.val()));
    return rows;
  } catch(e) {
    console.warn('Firebase read failed', e);
    return null; // 回傳 null 代表離線，改用本機
  }
}

// ── 本機備用排行榜 ──
const RECORDS_KEY = 'diceIdleRecords';
function loadLocalRecords() {
  try { return JSON.parse(localStorage.getItem(RECORDS_KEY)) || []; }
  catch(e) { return []; }
}
function saveLocalRecord(name, seconds) {
  const records = loadLocalRecords();
  records.push({ name, time: seconds, date: new Date().toLocaleDateString('zh-TW') });
  records.sort((a,b) => a.time - b.time);
  localStorage.setItem(RECORDS_KEY, JSON.stringify(records.slice(0,10)));
}

async function submitRecord() {
  const name = document.getElementById('win-name-input').value.trim() || '匿名';
  const seconds = Math.floor(gs.playSeconds);
  // 同時寫入 Firebase + 本機
  saveLocalRecord(name, seconds);
  await fbSubmit(name, seconds);
  document.getElementById('win-saved-msg').textContent = '✅ 已記錄！';
  document.getElementById('win-record-btn').disabled = true;
  document.getElementById('win-restart-btn').style.display = 'block';
}

function openLeaderboard() {
  document.getElementById('lb-modal').classList.add('show');
  refreshLeaderboard();
}
function closeLeaderboard() {
  document.getElementById('lb-modal').classList.remove('show');
}

function renderLbList(records) {
  const el = document.getElementById('lb-list');
  if (!records || records.length === 0) {
    el.innerHTML = '<div class="lb-empty">還沒有紀錄<br>達成 100 萬金幣後上榜！</div>';
    return;
  }
  const rankClass = ['gold','silver','bronze'];
  const rankIcon  = ['🥇','🥈','🥉'];
  el.innerHTML = records.map((r,i) => `
    <div class="lb-row">
      <div class="lb-rank ${rankClass[i]||''}">${rankIcon[i]||('#'+(i+1))}</div>
      <div class="lb-name">${r.name}</div>
      <div class="lb-time">${fmtTime(r.time)}</div>
      <div class="lb-date">${r.date}</div>
    </div>
  `).join('');
}

async function refreshLeaderboard() {
  renderLbList(loadLocalRecords()); // 先顯示本機
  const online = await fbLoadRecords();
  if (online !== null) renderLbList(online); // 有網路就換成線上
}

function restartGame() {
  if (!confirm('確定要重新開始嗎？目前進度將清除。')) return;
  closeLeaderboard();
  try { localStorage.removeItem('diceIdleSave'); } catch(e) {}
  document.querySelectorAll('.dice').forEach(e => e.remove());
  gs = createInitialState();
  document.getElementById('upgrade-area')._built = false;
  document.getElementById('win-banner').classList.remove('show');
  document.getElementById('win-saved-msg').textContent = '';
  document.getElementById('win-record-btn').disabled = false;
  document.getElementById('win-name-input').value = '';
  document.getElementById('win-restart-btn').style.display = 'none';
  renderComboBar(null);
  renderUpgrades();
  updateHUD();
  gs.lastTickTime = Date.now();
  for (let i = 0; i < 5; i++) spawnDice();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  const splash = document.getElementById('splash');
  splash.classList.add('hide');
  setTimeout(() => { splash.style.display = 'none'; }, 500);
  // Reset tick time so no phantom seconds accumulate from splash wait
  gs.lastTickTime = Date.now();
  for (let i = 0; i < 5; i++) spawnDice();
  requestAnimationFrame(gameLoop);
}

function init() {
  loadGame();
  renderUpgrades();
  updateHUD();
  // Game loop starts only when user clicks 開始遊戲 on splash
}
init();

// Expose functions needed by inline onclick handlers
window.startGame        = startGame;
window.restartGame      = restartGame;
window.togglePause      = togglePause;
window.openLeaderboard  = openLeaderboard;
window.closeLeaderboard = closeLeaderboard;
window.submitRecord     = submitRecord;
window.clickDice        = clickDice;
window.closeOfflinePopup= closeOfflinePopup;
</script>
