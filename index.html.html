<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🎲 Dice Idle MVP</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #1a1d2a;
    --surface2:  #242838;
    --accent:    #f5a623;
    --accent2:   #e74c3c;
    --text:      #e8e8f0;
    --muted:     #7a7d99;
    --green:     #2ecc71;
    --radius:    12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Status Bar ── */
  #status-bar {
    background: var(--surface);
    padding: 10px 14px 8px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 12px;
    border-bottom: 1px solid var(--surface2);
    flex-shrink: 0;
    z-index: 10;
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 5px;
    font-size: 12px;
  }
  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 700; font-size: 14px; color: var(--accent); }
  .stat-value.cps { color: var(--green); }
  .stat-value.goal { color: #9b59b6; }

  /* Progress bar */
  #progress-wrap {
    grid-column: 1 / -1;
    background: var(--surface2);
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
    margin-top: 2px;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #9b59b6, var(--accent));
    width: 0%;
    transition: width 0.5s;
    border-radius: 6px;
  }

  /* ── Dice Area ── */
  #dice-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1e2235 0%, var(--bg) 100%);
    cursor: default;
  }

  /* Background grid lines for depth */
  #dice-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .dice {
    position: absolute;
    width: 56px;
    height: 56px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    line-height: 1;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transform: scale(1);
    transition: transform 0.08s ease;
    animation: diceSpawn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform;
  }

  @keyframes diceSpawn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }

  .dice:active { transform: scale(0.88); }

  .dice.auto-clicked {
    animation: autoPulse 0.15s ease;
  }
  @keyframes autoPulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(0.82); }
    100% { transform: scale(1); }
  }

  /* Float text */
  .float-text {
    position: absolute;
    pointer-events: none;
    font-weight: 800;
    font-size: 18px;
    color: var(--accent);
    text-shadow: 0 2px 6px rgba(0,0,0,.6);
    animation: floatUp 0.85s ease-out forwards;
    z-index: 100;
    white-space: nowrap;
  }
  .float-text.crit {
    font-size: 22px;
    color: var(--accent2);
    text-shadow: 0 0 12px rgba(231,76,60,.8), 0 2px 6px rgba(0,0,0,.6);
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) scale(1);    opacity: 1; }
    60%  { transform: translateY(-52px) scale(1.1); opacity: 1; }
    100% { transform: translateY(-80px) scale(0.9); opacity: 0; }
  }

  /* ── Upgrade Area ── */
  #upgrade-area {
    background: var(--surface);
    border-top: 1px solid var(--surface2);
    flex-shrink: 0;
    max-height: 42vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #upgrade-area::-webkit-scrollbar { width: 4px; }
  #upgrade-area::-webkit-scrollbar-track { background: transparent; }
  #upgrade-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .upgrade-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 4px;
    font-weight: 700;
  }

  .upgrade-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer;
    color: var(--text);
    text-align: left;
    min-height: 56px;
    transition: border-color 0.15s, background 0.15s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
  }

  .upgrade-btn:not(:disabled):active { transform: scale(0.97); }

  .upgrade-btn:not(:disabled) {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--surface2) 0%, #2a2e45 100%);
  }
  .upgrade-btn:not(:disabled):hover {
    background: linear-gradient(135deg, #2a2e45 0%, #323759 100%);
  }

  .upgrade-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    border-color: transparent;
  }

  .upgrade-icon {
    font-size: 26px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  .upgrade-info { flex: 1; }
  .upgrade-name {
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .upgrade-level {
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 800;
    padding: 1px 5px;
    border-radius: 4px;
  }
  .upgrade-effect { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .upgrade-cost {
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    flex-shrink: 0;
    text-align: right;
  }

  /* ── Bottom Controls ── */
  #bottom-bar {
    background: var(--surface);
    border-top: 1px solid var(--surface2);
    padding: 8px 12px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid #3a3f5c;
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 6px;
    min-height: 44px;
    cursor: pointer;
    transition: background 0.15s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.95); background: #3a3f5c; }
  .ctrl-btn.danger { border-color: var(--accent2); color: var(--accent2); }
  .ctrl-btn.pause-active { background: #3a3f5c; }

  /* ── Win Banner ── */
  #win-banner {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    text-align: center;
    backdrop-filter: blur(4px);
  }
  #win-banner.show { display: flex; }
  #win-banner h2 { font-size: 28px; color: var(--accent); }
  #win-banner p  { font-size: 15px; color: var(--text); line-height: 1.6; }
  .next-stage {
    background: var(--surface2);
    border: 1.5px solid #9b59b6;
    border-radius: var(--radius);
    padding: 14px 20px;
    text-align: center;
    width: 100%;
    max-width: 280px;
  }
  .next-stage h3 { color: #9b59b6; font-size: 15px; }
  .next-stage small { color: var(--muted); font-size: 12px; }
  #win-close {
    background: var(--accent);
    color: #000;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    cursor: pointer;
  }

  /* ── Offline popup ── */
  #offline-popup {
    display: none;
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 2px solid var(--green);
    padding: 12px 16px;
    z-index: 150;
    animation: slideUp 0.3s ease;
    flex-direction: column;
    gap: 6px;
  }
  #offline-popup.show { display: flex; }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  #offline-popup p { font-size: 13px; }
  #offline-popup strong { color: var(--green); }
  #offline-popup button {
    align-self: flex-end;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Status Bar -->
  <div id="status-bar">
    <div class="stat">
      <span class="stat-label">💰 金幣</span>
      <span class="stat-value" id="stat-coins">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">🏆 總金幣</span>
      <span class="stat-value goal" id="stat-total">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">⚡ 每秒</span>
      <span class="stat-value cps" id="stat-cps">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">🎯 目標</span>
      <span class="stat-value goal" id="stat-progress">0%</span>
    </div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
  </div>

  <!-- Dice Area -->
  <div id="dice-area">
    <!-- Dice injected here -->
    <div id="win-banner">
      <h2>🎉 恭喜！</h2>
      <p>你已累積 <strong>1,000,000</strong> 金幣！<br>骰子大師成就解鎖！</p>
      <div class="next-stage">
        <h3>⚙️ 第二階段：骰子工廠</h3>
        <small>尚未開放 — 敬請期待</small>
      </div>
      <button id="win-close">繼續遊戲</button>
    </div>
  </div>

  <!-- Upgrade Area -->
  <div id="upgrade-area">
    <div class="upgrade-title">升級天賦</div>
    <!-- Upgrade buttons injected here -->
  </div>

  <!-- Bottom Controls -->
  <div id="bottom-bar">
    <button class="ctrl-btn" id="btn-save"    onclick="manualSave()">💾 存檔</button>
    <button class="ctrl-btn" id="btn-pause"   onclick="togglePause()">⏸ 暫停</button>
    <button class="ctrl-btn danger"            onclick="resetGame()">🔄 重置</button>
  </div>

  <!-- Offline reward popup -->
  <div id="offline-popup">
    <p id="offline-msg"></p>
    <button onclick="closeOfflinePopup()">OK</button>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════
   DICE IDLE MVP  –  core game script
   ═══════════════════════════════════════════ */

// ── Dice Unicode map ──
const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

// ── Upgrade definitions ──
const UPGRADE_DEFS = [
  {
    key: 'coinMultiplierLevel',
    name: '金幣倍率',
    icon: '💎',
    baseCost: 20,
    effect: (lvl) => `x${(1 + lvl * 0.2).toFixed(1)} 倍收益`
  },
  {
    key: 'spawnSpeedLevel',
    name: '骰子生成速度',
    icon: '⚡',
    baseCost: 50,
    effect: (lvl) => `每 ${(Math.max(300, 2000 * Math.pow(0.92, lvl)) / 1000).toFixed(2)}s 生成一顆`
  },
  {
    key: 'maxDiceLevel',
    name: '骰子上限',
    icon: '🎲',
    baseCost: 100,
    effect: (lvl) => `最多 ${10 + lvl * 3} 顆骰子`
  },
  {
    key: 'critChanceLevel',
    name: '暴擊率',
    icon: '💥',
    baseCost: 500,
    effect: (lvl) => `${Math.min(50, lvl)}% 暴擊 (x10)`
  },
  {
    key: 'autoClickLevel',
    name: '自動手指',
    icon: '🤖',
    baseCost: 1500,
    effect: (lvl) => lvl === 0
      ? '尚未解鎖'
      : `每 ${(Math.max(500, 5000 * Math.pow(0.85, lvl - 1)) / 1000).toFixed(2)}s 自動點一顆`
  }
];

// ── Initial game state ──
function createInitialState() {
  return {
    coins: 0,
    totalCoinsEarned: 0,
    diceList: [],
    nextDiceId: 1,

    coinMultiplierLevel: 0,
    spawnSpeedLevel: 0,
    maxDiceLevel: 0,
    critChanceLevel: 0,
    autoClickLevel: 0,

    lastUpdateTime: Date.now(),
    lastSpawnTime:  Date.now(),
    lastAutoClickTime: Date.now(),
    lastSaveTime:   Date.now(),

    isPaused: false,
    winShown: false
  };
}

let gameState = createInitialState();

// ── Derived values (computed from state) ──
function coinMultiplier()   { return 1 + gameState.coinMultiplierLevel * 0.2; }
function spawnInterval()    { return Math.max(300, 2000 * Math.pow(0.92, gameState.spawnSpeedLevel)); }
function maxDice()          { return 10 + gameState.maxDiceLevel * 3; }
function critChance()       { return Math.min(0.5, gameState.critChanceLevel * 0.01); }
function autoClickInterval(){ return Math.max(500, 5000 * Math.pow(0.85, gameState.autoClickLevel - 1)); }

function estimatedCps() {
  const dicePerSec     = 1000 / spawnInterval();
  const critMult       = 1 + critChance() * 9;    // expected crit multiplier
  const baseCps        = dicePerSec * 3.5 * coinMultiplier() * critMult;

  let autoCps = 0;
  if (gameState.autoClickLevel > 0) {
    const acPerSec = 1000 / autoClickInterval();
    autoCps = acPerSec * 3.5 * coinMultiplier() * critMult;
  }
  return baseCps + autoCps;
}

function getUpgradeCost(key, level) {
  const def = UPGRADE_DEFS.find(d => d.key === key);
  return Math.floor(def.baseCost * Math.pow(1.35, level));
}

// ── Number formatter ──
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

// ── Dice spawning ──
function spawnDice() {
  if (gameState.diceList.length >= maxDice()) return;

  const DICE_SIZE = 56;
  const area = document.getElementById('dice-area');
  const W = area.clientWidth  - DICE_SIZE;
  const H = area.clientHeight - DICE_SIZE;

  const value = Math.ceil(Math.random() * 6);
  const dice = {
    id:        gameState.nextDiceId++,
    value:     value,
    x:         Math.random() * W,
    y:         Math.random() * H,
    createdAt: Date.now()
  };

  gameState.diceList.push(dice);
  renderDice(dice);
}

function renderDice(dice) {
  const area = document.getElementById('dice-area');
  const el = document.createElement('div');
  el.className = 'dice';
  el.id = 'dice-' + dice.id;
  el.textContent = DICE_FACES[dice.value - 1];
  el.style.left = dice.x + 'px';
  el.style.top  = dice.y + 'px';
  // Bind click
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    clickDice(dice.id, false);
  });
  area.appendChild(el);
}

// ── Click a dice ──
function clickDice(diceId, isAuto = false) {
  const idx = gameState.diceList.findIndex(d => d.id === diceId);
  if (idx === -1) return;

  const dice = gameState.diceList[idx];
  const { reward, isCrit } = calculateDiceReward(dice.value);

  gameState.coins          += reward;
  gameState.totalCoinsEarned += reward;

  // Remove from state
  gameState.diceList.splice(idx, 1);

  // Remove from DOM + show float text
  const el = document.getElementById('dice-' + diceId);
  if (el) {
    showFloatText(dice.x + 28, dice.y + 28, reward, isCrit);
    el.remove();
  }

  // Check win
  if (!gameState.winShown && gameState.totalCoinsEarned >= 1_000_000) {
    gameState.winShown = true;
    document.getElementById('win-banner').classList.add('show');
  }

  updateStatusBar();
  renderUpgrades();
}

function calculateDiceReward(diceValue) {
  const isCrit = Math.random() < critChance();
  const base   = diceValue * coinMultiplier();
  const reward = isCrit ? base * 10 : base;
  return { reward: Math.floor(reward), isCrit };
}

// ── Float text ──
function showFloatText(x, y, amount, isCrit) {
  const area = document.getElementById('dice-area');
  const el = document.createElement('div');
  el.className = 'float-text' + (isCrit ? ' crit' : '');
  el.textContent = isCrit ? `CRIT +${fmt(amount)}` : `+${fmt(amount)}`;
  el.style.left = (x - 20) + 'px';
  el.style.top  = (y - 10) + 'px';
  area.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ── Upgrades ──
function buyUpgrade(key) {
  const lvl  = gameState[key];
  const cost = getUpgradeCost(key, lvl);
  if (gameState.coins < cost) return;

  gameState.coins -= cost;
  gameState[key]  += 1;

  saveGame();
  renderUpgrades();
  updateStatusBar();
}

function renderUpgrades() {
  const area = document.getElementById('upgrade-area');
  // Only rebuild once; update afterwards in-place for perf
  if (!area._built) {
    area.innerHTML = '<div class="upgrade-title">升級天賦</div>';
    UPGRADE_DEFS.forEach(def => {
      const btn = document.createElement('button');
      btn.className  = 'upgrade-btn';
      btn.id         = 'upg-' + def.key;
      btn.innerHTML  = `
        <div class="upgrade-icon">${def.icon}</div>
        <div class="upgrade-info">
          <div class="upgrade-name">${def.name} <span class="upgrade-level" id="upg-lv-${def.key}">Lv.0</span></div>
          <div class="upgrade-effect" id="upg-eff-${def.key}"></div>
        </div>
        <div class="upgrade-cost" id="upg-cost-${def.key}"></div>
      `;
      btn.addEventListener('click', () => buyUpgrade(def.key));
      area.appendChild(btn);
    });
    area._built = true;
  }

  // Update each button's data
  UPGRADE_DEFS.forEach(def => {
    const lvl  = gameState[def.key];
    const cost = getUpgradeCost(def.key, lvl);
    const canAfford = gameState.coins >= cost;

    document.getElementById('upg-lv-' + def.key).textContent   = 'Lv.' + lvl;
    document.getElementById('upg-eff-' + def.key).textContent  = def.effect(lvl);
    document.getElementById('upg-cost-' + def.key).textContent = '🪙 ' + fmt(cost);

    const btn = document.getElementById('upg-' + def.key);
    btn.disabled = !canAfford;
  });
}

// ── Status bar ──
function updateStatusBar() {
  const total = gameState.totalCoinsEarned;
  const pct   = Math.min(100, (total / 1_000_000) * 100);

  document.getElementById('stat-coins').textContent    = fmt(gameState.coins);
  document.getElementById('stat-total').textContent    = fmt(total);
  document.getElementById('stat-cps').textContent      = fmt(estimatedCps()) + '/s';
  document.getElementById('stat-progress').textContent = pct.toFixed(1) + '%';
  document.getElementById('progress-bar').style.width  = pct + '%';
}

// ── Game loop ──
function gameLoop() {
  if (!gameState.isPaused) {
    const now = Date.now();

    // Spawning
    if (now - gameState.lastSpawnTime >= spawnInterval()) {
      spawnDice();
      gameState.lastSpawnTime = now;
    }

    // Auto clicker
    if (gameState.autoClickLevel > 0) {
      if (now - gameState.lastAutoClickTime >= autoClickInterval()) {
        if (gameState.diceList.length > 0) {
          const target = gameState.diceList[Math.floor(Math.random() * gameState.diceList.length)];
          // Small visual pulse on the element
          const el = document.getElementById('dice-' + target.id);
          if (el) {
            el.classList.remove('auto-clicked');
            void el.offsetWidth; // reflow to restart animation
            el.classList.add('auto-clicked');
          }
          clickDice(target.id, true);
        }
        gameState.lastAutoClickTime = now;
      }
    }

    // Auto-save every 5 s
    if (now - gameState.lastSaveTime >= 5000) {
      saveGame();
    }
  }

  requestAnimationFrame(gameLoop);
}

// ── Save / Load / Reset ──
function saveGame() {
  const toSave = {
    coins:              gameState.coins,
    totalCoinsEarned:   gameState.totalCoinsEarned,
    coinMultiplierLevel: gameState.coinMultiplierLevel,
    spawnSpeedLevel:    gameState.spawnSpeedLevel,
    maxDiceLevel:       gameState.maxDiceLevel,
    critChanceLevel:    gameState.critChanceLevel,
    autoClickLevel:     gameState.autoClickLevel,
    nextDiceId:         gameState.nextDiceId,
    winShown:           gameState.winShown,
    lastSaveTime:       Date.now()
  };
  try {
    localStorage.setItem('diceIdleSave', JSON.stringify(toSave));
  } catch(e) { /* ignore */ }
  gameState.lastSaveTime = Date.now();
}

function loadGame() {
  try {
    const raw = localStorage.getItem('diceIdleSave');
    if (!raw) return;
    const data = JSON.parse(raw);

    gameState.coins               = data.coins              ?? 0;
    gameState.totalCoinsEarned    = data.totalCoinsEarned   ?? 0;
    gameState.coinMultiplierLevel = data.coinMultiplierLevel ?? 0;
    gameState.spawnSpeedLevel     = data.spawnSpeedLevel    ?? 0;
    gameState.maxDiceLevel        = data.maxDiceLevel       ?? 0;
    gameState.critChanceLevel     = data.critChanceLevel    ?? 0;
    gameState.autoClickLevel      = data.autoClickLevel     ?? 0;
    gameState.nextDiceId          = data.nextDiceId         ?? 1;
    gameState.winShown            = data.winShown           ?? false;

    // Offline rewards
    if (data.lastSaveTime) {
      const offlineSec = Math.min((Date.now() - data.lastSaveTime) / 1000, 3600);
      if (offlineSec >= 5) {
        const cps    = estimatedCps();
        const reward = Math.floor(cps * offlineSec * 0.1);
        if (reward > 0) {
          gameState.coins            += reward;
          gameState.totalCoinsEarned += reward;
          showOfflinePopup(offlineSec, reward);
        }
      }
    }
  } catch(e) { /* corrupt save – start fresh */ }
}

function manualSave() {
  saveGame();
  const btn = document.getElementById('btn-save');
  btn.textContent = '✅ 已存檔';
  setTimeout(() => { btn.textContent = '💾 存檔'; }, 1200);
}

function resetGame() {
  if (!confirm('確定要重置遊戲嗎？所有進度將清除！')) return;
  try { localStorage.removeItem('diceIdleSave'); } catch(e) {}
  // Clear dice from DOM
  document.querySelectorAll('.dice').forEach(el => el.remove());
  gameState = createInitialState();
  document.getElementById('upgrade-area')._built = false;
  document.getElementById('win-banner').classList.remove('show');
  renderUpgrades();
  updateStatusBar();
}

function togglePause() {
  gameState.isPaused = !gameState.isPaused;
  const btn = document.getElementById('btn-pause');
  btn.textContent = gameState.isPaused ? '▶ 繼續' : '⏸ 暫停';
  btn.classList.toggle('pause-active', gameState.isPaused);
}

// ── Offline popup ──
function showOfflinePopup(sec, reward) {
  const popup = document.getElementById('offline-popup');
  const msg   = document.getElementById('offline-msg');
  const mins  = sec >= 60 ? `${Math.floor(sec/60)} 分 ${Math.floor(sec%60)} 秒` : `${Math.floor(sec)} 秒`;
  msg.innerHTML = `⏰ 你離線了 <strong>${mins}</strong>，獲得離線收益 <strong>+${fmt(reward)} 金幣</strong>（效率 10%）`;
  popup.classList.add('show');
}

function closeOfflinePopup() {
  document.getElementById('offline-popup').classList.remove('show');
}

// ── Win banner close ──
document.getElementById('win-close').addEventListener('click', () => {
  document.getElementById('win-banner').classList.remove('show');
});

// ── Boot ──
function init() {
  loadGame();
  renderUpgrades();
  updateStatusBar();

  // Show win banner if already won on reload
  if (gameState.winShown) {
    // Don't auto-show; let player keep playing
  }

  // Spawn a few dice immediately so screen isn't empty
  setTimeout(() => { spawnDice(); spawnDice(); spawnDice(); }, 200);

  requestAnimationFrame(gameLoop);
}

init();
</script>
</body>
</html>
